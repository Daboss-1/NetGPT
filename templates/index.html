<!DOCTYPE html>
<html lang='en'>

<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>NetGPT Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: light;
            --bg: #f5f7fb;
            --bg-2: #eaeff5;
            --panel: rgba(255, 255, 255, 0.92);
            --panel-strong: rgba(255, 255, 255, 0.97);
            --text: #111827;
            --text-secondary: #374151;
            --muted: #6b7280;
            --accent: #0f766e;
            --accent-light: #14b8a6;
            --accent-2: #ea580c;
            --border: rgba(0, 0, 0, 0.08);
            --border-accent: rgba(15, 118, 110, 0.2);
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            --shadow-soft: 0 2px 12px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.08);
            --radius-xl: 20px;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --focus-ring: 0 0 0 3px rgba(15, 118, 110, 0.22);
            --space-xs: 6px;
            --space-sm: 10px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --space-2xl: 40px;
            --nav-h: 56px;
            --sidebar-w: 260px;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            color: var(--text);
            font-size: 15px;
            line-height: 1.6;
            background: var(--bg);
        }

        .skip-link {
            position: absolute;
            left: var(--space-md);
            top: var(--space-md);
            padding: var(--space-sm) var(--space-md);
            border-radius: var(--radius-sm);
            background: #ffffff;
            border: 1px solid var(--border);
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
            box-shadow: var(--shadow);
            transform: translateY(-200%);
            transition: transform 0.18s ease;
            z-index: 200;
        }

        .skip-link:focus {
            transform: translateY(0);
            outline: none;
            box-shadow: var(--focus-ring);
        }

        /* ─── App Shell ─── */
        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* ─── Navbar ─── */
        .navbar {
            flex-shrink: 0;
            height: var(--nav-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--space-xl);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .navbar-brand {
            display: flex;
            align-items: baseline;
            gap: var(--space-md);
        }

        .navbar-brand h1 {
            margin: 0;
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            color: var(--text);
        }

        .navbar-brand .tagline {
            font-size: 0.82rem;
            color: var(--muted);
            font-weight: 400;
        }

        .navbar-user {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .user-pill {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: 5px 12px;
            border-radius: 999px;
            background: rgba(15, 118, 110, 0.07);
            border: 1px solid var(--border-accent);
            font-size: 0.83rem;
            color: var(--accent);
            font-weight: 500;
        }

        .user-pill .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
        }

        .navbar-logout {
            padding: 6px 14px;
            font-size: 0.82rem;
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
            box-shadow: none;
        }

        .navbar-logout:hover {
            background: rgba(0, 0, 0, 0.04);
            color: var(--text);
            transform: none;
            box-shadow: none;
        }

        /* ─── Main body (sidebar + content) ─── */
        .shell {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ─── Sidebar ─── */
        .sidebar {
            width: var(--sidebar-w);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.96);
            border-right: 1px solid var(--border);
            overflow: hidden;
        }

        .sidebar-top {
            padding: var(--space-lg) var(--space-md) var(--space-sm);
            border-bottom: 1px solid var(--border);
        }

        .sidebar-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-bottom: var(--space-sm);
        }

        .sidebar h3 {
            margin: 0;
            font-size: 0.76rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .sidebar-chats {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-sm) var(--space-sm);
        }

        .sidebar-new-chat {
            width: 100%;
            text-align: left;
            padding: 9px 12px;
            font-size: 0.88rem;
            border-radius: var(--radius-md);
            margin-bottom: var(--space-xs);
        }

        .chat-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .chat-item {
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: background 0.12s ease, border-color 0.12s ease;
        }

        .chat-item:hover {
            background: rgba(15, 118, 110, 0.05);
            border-color: var(--border);
        }

        .chat-item.is-active {
            border-color: var(--border-accent);
            background: rgba(15, 118, 110, 0.08);
        }

        .chat-title {
            font-size: 0.86rem;
            color: var(--text);
            line-height: 1.4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-meta {
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 2px;
        }

        /* ─── Sidebar auth footer ─── */
        .sidebar-auth {
            padding: var(--space-md);
            border-top: 1px solid var(--border);
            background: rgba(248, 249, 252, 0.8);
            flex-shrink: 0;
        }

        .auth-hint {
            color: var(--muted);
            font-size: 0.8rem;
            line-height: 1.5;
            margin-top: var(--space-xs);
        }

        .auth-field {
            width: 100%;
            display: block;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            padding: 9px 11px;
            margin-bottom: var(--space-sm);
            background: #ffffff;
            font: inherit;
            font-size: 0.88rem;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .auth-field:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: var(--focus-ring);
        }

        .auth-actions {
            display: flex;
            gap: var(--space-xs);
            margin-top: var(--space-xs);
        }

        .auth-actions button {
            flex: 1;
            padding: 8px 10px;
            font-size: 0.83rem;
        }

        .account-muted {
            color: var(--muted);
            font-size: 0.82rem;
            line-height: 1.5;
            margin-top: var(--space-xs);
        }



        /* ─── Main content area ─── */
        .main-content {
            flex: 1;
            display: grid;
            grid-template-columns: minmax(300px, 380px) minmax(0, 1fr);
            grid-template-rows: 100%;
            overflow: hidden;
        }

        /* ─── Composer panel ─── */
        .composer {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: var(--space-xl);
            border-right: 1px solid var(--border);
            background: #ffffff;
        }

        /* ─── Output panel ─── */
        .output-panel {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: var(--space-xl);
            background: var(--bg);
        }

        .section-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-md);
            margin-bottom: var(--space-md);
            color: var(--muted);
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .section-label span {
            font-family: 'IBM Plex Mono', monospace;
        }

        .select-wrap,
        .field,
        textarea,
        #imageInput {
            width: 100%;
        }

        .select-wrap {
            position: relative;
        }

        .select-wrap::after {
            content: '▾';
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none;
            font-size: 0.85rem;
        }

        select,
        textarea,
        input[type='file'] {
            font: inherit;
            font-size: 0.92rem;
        }

        select {
            appearance: none;
            border: 1px solid var(--border);
            background: #ffffff;
            color: var(--text);
            border-radius: var(--radius-md);
            padding: 11px 40px 11px 14px;
            width: 100%;
            box-shadow: var(--shadow-soft);
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .help {
            margin: var(--space-sm) 0 var(--space-md);
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--muted);
        }

        .field {
            margin-top: var(--space-md);
        }

        #imageInput {
            display: block;
            padding: 9px 12px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            background: #ffffff;
            margin-top: var(--space-sm);
            margin-bottom: var(--space-md);
            font-size: 0.85rem;
        }

        textarea {
            flex: 1;
            min-height: 120px;
            resize: none;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            background: #ffffff;
            padding: var(--space-md);
            color: var(--text);
            line-height: 1.7;
            box-shadow: var(--shadow-soft);
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        textarea::placeholder {
            color: #9ca3af;
        }

        textarea:focus,
        select:focus,
        input[type='file']:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: var(--focus-ring);
        }

        button:focus-visible {
            outline: none;
            box-shadow: var(--focus-ring);
        }

        .actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: var(--space-md);
            margin-top: var(--space-md);
            flex-shrink: 0;
        }

        .meta {
            color: var(--muted);
            font-size: 0.85rem;
            line-height: 1.4;
        }

        /* ─── Buttons ─── */
        button {
            appearance: none;
            border: 0;
            border-radius: var(--radius-md);
            padding: 10px 20px;
            background: var(--accent);
            color: #ffffff;
            font: inherit;
            font-size: 0.88rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            box-shadow: 0 2px 8px rgba(15, 118, 110, 0.18);
            cursor: pointer;
            transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(15, 118, 110, 0.25);
            background: #0d6b64;
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 1px 4px rgba(15, 118, 110, 0.2);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ─── Thinking indicator ─── */
        .thinking-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: var(--space-sm);
            padding: 5px 12px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.9);
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: 500;
            opacity: 0;
            transform: translateY(-4px);
            transition: opacity 0.18s ease, transform 0.18s ease;
            pointer-events: none;
            align-self: flex-start;
            flex-shrink: 0;
        }

        .thinking-indicator.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        .thinking-dots {
            display: inline-flex;
            gap: 3px;
        }

        .thinking-dots span {
            width: 5px;
            height: 5px;
            border-radius: 999px;
            background: var(--accent);
            animation: pulse 1.2s infinite ease-in-out;
        }

        .thinking-dots span:nth-child(2) { animation-delay: 0.16s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0.32s; }

        @keyframes pulse {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
            40% { transform: translateY(-3px); opacity: 1; }
        }

        /* ─── Chat Output ─── */
        #responseOutput {
            flex: 1;
            min-height: 0;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.8);
            padding: var(--space-lg);
            line-height: 1.7;
            color: var(--text-secondary);
            overflow-y: auto;
        }

        #responseOutput.chat-thread {
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }

        .message {
            max-width: 82%;
            padding: var(--space-md) var(--space-lg);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            background: #ffffff;
            color: var(--text);
            box-shadow: var(--shadow-soft);
            word-wrap: break-word;
            line-height: 1.7;
        }

        .message.user {
            align-self: flex-end;
            background: rgba(15, 118, 110, 0.06);
            border-color: var(--border-accent);
        }

        .message.assistant {
            align-self: flex-start;
            background: #ffffff;
            color: var(--text-secondary);
        }

        .message .message-content p,
        .message .message-content ul,
        .message .message-content ol,
        .message .message-content blockquote,
        .message .message-content h1,
        .message .message-content h2,
        .message .message-content h3,
        .message .message-content h4,
        .message .message-content h5,
        .message .message-content h6,
        .message .message-content pre,
        .message .message-content .math-block {
            margin: 0 0 var(--space-md);
        }

        .message .message-content > *:last-child {
            margin-bottom: 0;
        }

        #responseOutput p,
        #responseOutput ul,
        #responseOutput ol,
        #responseOutput blockquote,
        #responseOutput h1,
        #responseOutput h2,
        #responseOutput h3,
        #responseOutput h4,
        #responseOutput h5,
        #responseOutput h6,
        #responseOutput pre,
        #responseOutput .math-block {
            margin: 0 0 var(--space-md);
        }

        #responseOutput h1, #responseOutput h2,
        #responseOutput h3, #responseOutput h4 {
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: -0.02em;
            line-height: 1.3;
            color: var(--text);
        }

        #responseOutput h1 { font-size: 1.5rem; }
        #responseOutput h2 { font-size: 1.25rem; }
        #responseOutput h3 { font-size: 1.05rem; }

        #responseOutput strong { font-weight: 700; color: var(--text); }
        #responseOutput em { font-style: italic; }
        #responseOutput ul, #responseOutput ol { padding-left: 1.3rem; }
        #responseOutput li + li { margin-top: 4px; }

        #responseOutput hr {
            border: 0;
            border-top: 1px solid var(--border);
            margin: var(--space-lg) 0;
        }

        #responseOutput blockquote {
            border-left: 3px solid var(--accent);
            padding: var(--space-sm) var(--space-md);
            background: rgba(15, 118, 110, 0.04);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            color: var(--text-secondary);
        }

        #responseOutput code {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.88em;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.05);
            color: var(--text);
        }

        #responseOutput pre {
            overflow-x: auto;
            padding: var(--space-md);
            border-radius: var(--radius-md);
            background: #f8f9fa;
            border: 1px solid var(--border);
        }

        #responseOutput pre code {
            padding: 0;
            background: transparent;
        }

        #responseOutput .math-block {
            padding: var(--space-md);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            background: #f8faf9;
            font-family: 'IBM Plex Mono', monospace;
            white-space: pre-wrap;
        }

        #responseOutput .math-block .math-label {
            display: block;
            margin-bottom: var(--space-xs);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent);
            font-weight: 500;
        }

        #responseOutput .placeholder {
            color: var(--muted);
        }

        .muted-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.02);
            color: var(--muted);
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
        }

        /* ─── Responsive ─── */
        @media (max-width: 900px) {
            :root { --sidebar-w: 220px; }
        }

        @media (max-width: 700px) {
            .sidebar { display: none; }
            .main-content { grid-template-columns: 1fr; }
            .composer { border-right: none; border-bottom: 1px solid var(--border); }
        }

        @media (max-width: 540px) {
            .navbar { padding: 0 var(--space-md); }
            .navbar-brand .tagline { display: none; }
            .main-content { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
            .composer { overflow: visible; }
            .output-panel { padding: var(--space-md); }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>

<body>
    <a class="skip-link" href="#main">Skip to main content</a>
    <div class="app">
        <!-- ─── Navbar ─── -->
        <nav class="navbar" aria-label="Site navigation">
            <div class="navbar-brand">
                <h1>NetGPT</h1>
                <span class="tagline">Cloud &amp; local LLMs in one place</span>
            </div>
            <div class="navbar-user" id="navbarUser">
                <!-- filled by setAuthState() -->
            </div>
        </nav>

        <!-- ─── Shell: sidebar + content ─── -->
        <div class="shell">
            <!-- ─── Sidebar ─── -->
            <aside class="sidebar" aria-label="Chat history">
                <div class="sidebar-top">
                    <div class="sidebar-label">Chats</div>
                    <button class="sidebar-new-chat" onclick="createChat()">+ New chat</button>
                </div>
                <div class="sidebar-chats">
                    <ul class="chat-list" id="chatList"></ul>
                    <div class="account-muted" id="chatHint">Login to access saved chats.</div>
                </div>

                <!-- ─── Auth footer ─── -->
                <div class="sidebar-auth">
                    <div id="accountAuthed" style="display:none;">
                        <div class="sidebar-label">Account</div>
                        <div class="account-muted" id="accountEmail"></div>
                    </div>
                    <div id="accountGuest" style="display:none;">
                        <div class="sidebar-label">Sign in</div>
                        <input class="auth-field" id="authEmail" type="email" placeholder="you@example.com" aria-label="Email">
                        <input class="auth-field" id="authPassword" type="password" placeholder="Password" aria-label="Password">
                        <div class="auth-actions">
                            <button onclick="login()">Log in</button>
                            <button onclick="signup()">Sign up</button>
                        </div>
                        <div class="auth-hint">Save and switch chats when signed in.</div>
                    </div>
                </div>
            </aside>

            <!-- ─── Main content ─── -->
            <div class="main-content" id="main">
                <!-- Composer -->
                <div class="composer" role="form" aria-label="Message composer">
                    <div class="section-label"><span>Model</span></div>
                    <div class="select-wrap">
                        <select id="modelSelect">
                            <optgroup label="Cloud">
                                <option value="groq-llama-3.3-70b-versatile">Llama 3.3 70B (Groq)</option>
                                <option value="groq-llama-3.1-8b-instant">Llama 3.1 8B Instant (Groq)</option>
                                <option value="deepseek-chat">DeepSeek Chat</option>
                                <option value="anthropic-claude-sonnet-4-6">Claude 4.6 Sonnet (Anthropic)</option>
                                <option value="gemini-2.5-flash">Gemini 2.5 Flash (Google)</option>
                            </optgroup>
                            <optgroup label="Ollama Local">
                                <option value="offline:qwen2.5:7b">Qwen 2.5 7B</option>
                                <option value="offline:deepseek-r1:7b">DeepSeek R1 7B</option>
                                <option value="offline:llama3.2:3b">Llama 3.2 3B</option>
                                <option value="offline:qwen2.5-coder:7b">Qwen 2.5 Coder 7B</option>
                                <option value="offline:llama3.1:8b">Llama 3.1 8B</option>
                                <option value="offline:qwen2.5:1.5b">Qwen 2.5 1.5B</option>
                            </optgroup>
                        </select>
                    </div>

                    <p class="help" id="modelReferenceCopy"></p>

                    <label class="muted-pill" for="imageInput">&#128206; Attach file</label>
                    <input id="imageInput" type="file" aria-label="Attach a file">
                    <textarea id="userInput" placeholder="What would you like to know?" aria-label="Your message"></textarea>

                    <div class="actions">
                        <button onclick="sendToGroq()">Send message</button>
                    </div>
                </div>

                <!-- Output -->
                <div class="output-panel" aria-label="Chat output">
                    <div class="section-label"><span>Conversation</span></div>
                    <div id="thinkingIndicator" class="thinking-indicator" aria-live="polite" aria-busy="false">
                        <span>Model is thinking</span>
                        <span class="thinking-dots" aria-hidden="true"><span></span><span></span><span></span></span>
                    </div>
                    <div id="responseOutput" class="chat-thread"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        var accumulatedResponses = [
            { role: 'system', content: 'You are a helpful assistant.' }
        ];
        var offlineJobId = null;
        var offlinePollActive = false;
        var offlineStatusTimer = null;
        var isOfflineRequestActive = false;
        var isAuthenticated = false;
        var currentChatId = null;

        function setAuthState(authenticated, payload) {
            isAuthenticated = authenticated;
            const authed = document.getElementById('accountAuthed');
            const guest = document.getElementById('accountGuest');
            const navbarUser = document.getElementById('navbarUser');
            if (authenticated) {
                authed.style.display = 'block';
                guest.style.display = 'none';
                document.getElementById('accountEmail').textContent = payload.email || '';
                document.getElementById('chatHint').textContent = '';
                navbarUser.innerHTML = '<span class="user-pill"><span class="dot"></span>' + (payload.email || '') + '</span>'
                    + '<button class="navbar-logout" onclick="logout()">Sign out</button>';
                loadChats();
            } else {
                authed.style.display = 'none';
                guest.style.display = 'block';
                currentChatId = null;
                document.getElementById('chatList').innerHTML = '';
                document.getElementById('chatHint').textContent = 'Login to access saved chats.';
                navbarUser.innerHTML = '';
            }
        }

        async function refreshAccount() {
            try {
                const response = await fetch('/api/auth/me');
                const data = await response.json();
                if (data.authenticated) {
                    setAuthState(true, data);
                } else {
                    setAuthState(false, {});
                }
            } catch (error) {
                setAuthState(false, {});
            }
        }

        async function login() {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await response.json();
            if (!response.ok) {
                alert(data.error || 'Login failed.');
                return;
            }
            setAuthState(true, data);
        }

        async function signup() {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;
            const response = await fetch('/api/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await response.json();
            if (!response.ok) {
                alert(data.error || 'Signup failed.');
                return;
            }
            setAuthState(true, data);
        }

        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            setAuthState(false, {});
        }

        function renderChatList(chats) {
            const list = document.getElementById('chatList');
            list.innerHTML = '';
            if (!chats.length) {
                document.getElementById('chatHint').textContent = 'No saved chats yet.';
                return;
            }
            document.getElementById('chatHint').textContent = '';
            chats.forEach(chat => {
                const item = document.createElement('li');
                item.className = 'chat-item' + (chat.id === currentChatId ? ' is-active' : '');
                item.dataset.chatId = chat.id;
                item.innerHTML = `<div class="chat-title">${escapeHtml(chat.title || 'Untitled chat')}</div>`;
                item.addEventListener('click', () => selectChat(chat.id));
                list.appendChild(item);
            });
        }

        async function loadChats() {
            if (!isAuthenticated) {
                return;
            }
            const response = await fetch('/api/chats');
            const data = await response.json();
            if (!response.ok) {
                document.getElementById('chatHint').textContent = data.error || 'Unable to load chats.';
                return;
            }
            renderChatList(data.chats || []);
            if (!currentChatId && data.chats && data.chats.length) {
                selectChat(data.chats[0].id);
            }
        }

        async function selectChat(chatId) {
            if (!isAuthenticated) {
                return;
            }
            currentChatId = chatId;
            const response = await fetch(`/api/chats/${chatId}`);
            const data = await response.json();
            if (!response.ok) {
                alert(data.error || 'Unable to load chat.');
                return;
            }
            const responseOutput = document.getElementById('responseOutput');
            responseOutput.innerHTML = '';
            responseOutput.classList.add('chat-thread');
            accumulatedResponses = [{ role: 'system', content: 'You are a helpful assistant.' }];
            (data.messages || []).forEach(message => {
                accumulatedResponses.push(message);
                appendMessage(message.role, message.content, false);
            });
            loadChats();
        }

        async function createChat() {
            if (!isAuthenticated) {
                alert('Please login to create a chat.');
                return;
            }
            const response = await fetch('/api/chats', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
            const data = await response.json();
            if (!response.ok) {
                alert(data.error || 'Unable to create chat.');
                return;
            }
            currentChatId = data.chatId;
            accumulatedResponses = [{ role: 'system', content: 'You are a helpful assistant.' }];
            const responseOutput = document.getElementById('responseOutput');
            responseOutput.innerHTML = '';
            loadChats();
        }
        function getSelectedModel() {
            return document.getElementById('modelSelect').value;
        }

        function isOfflineModel(modelValue) {
            return modelValue === 'offline' || modelValue.startsWith('offline:');
        }

        function getOfflineModelName(modelValue) {
            if (modelValue.startsWith('offline:')) {
                return modelValue.slice('offline:'.length);
            }
            return '';
        }

        function updateModelReference() {
            const selectedModel = getSelectedModel();
            const referenceCopy = document.getElementById('modelReferenceCopy');
            const imageInput = document.getElementById('imageInput');

            if (isOfflineModel(selectedModel)) {
                const offlineModelName = getOfflineModelName(selectedModel);
                const modelCopy = offlineModelName ? ` (${offlineModelName})` : '';
                referenceCopy.textContent = `This uses Ollama locally${modelCopy}. It is intensive to run, so use it only when needed.`;
            } else {
                referenceCopy.textContent = 'This uses the selected model in the cloud, for online use.';
            }

            imageInput.style.display = 'block';
            refreshOfflineStatus();
        }

        function readFileAsDataUrl(file) {
            return new Promise((resolve, reject) => {
                if (!file) {
                    resolve('');
                    return;
                }

                const reader = new FileReader();
                reader.onload = () => resolve(reader.result || '');
                reader.onerror = () => reject(new Error('Unable to read image file.'));
                reader.readAsDataURL(file);
            });
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatInline(text) {
            return escapeHtml(text)
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/(^|[^*])\*(?!\s)(.+?)(?!\s)\*(?!\*)/g, '$1<em>$2</em>')
                .replace(/`([^`]+)`/g, '<code>$1</code>');
        }

        function normalizeKaTeX(text) {
            if (!text) {
                return text;
            }

            const segments = String(text).split('```');
            for (let i = 0; i < segments.length; i += 2) {
                segments[i] = segments[i]
                    .replace(/\\\[/g, '$$')
                    .replace(/\\\]/g, '$$')
                    .replace(/\\\(/g, '$')
                    .replace(/\\\)/g, '$');
            }
            return segments.join('```');
        }

        function renderResponseMarkdown(text) {
            const normalized = normalizeKaTeX(text);
            const lines = String(normalized || '').replace(/\r\n/g, '\n').split('\n');
            const output = [];
            let currentListType = null;
            let listItems = [];
            let codeLines = [];
            let inCode = false;
            let mathLines = [];
            let inMath = false;

            const flushList = () => {
                if (!currentListType) {
                    return;
                }

                const items = listItems.map(item => `<li>${item}</li>`).join('');
                output.push(`<${currentListType}>${items}</${currentListType}>`);
                currentListType = null;
                listItems = [];
            };

            const flushCode = () => {
                if (!inCode) {
                    return;
                }

                output.push(`<pre><code>${escapeHtml(codeLines.join('\n'))}</code></pre>`);
                codeLines = [];
                inCode = false;
            };

            const flushMath = () => {
                if (!inMath) {
                    return;
                }

                output.push(`<div class="math-block"><span class="math-label">Equation</span><div>${escapeHtml(mathLines.join('\n'))}</div></div>`);
                mathLines = [];
                inMath = false;
            };

            const flushParagraph = (paragraphLines) => {
                const paragraph = paragraphLines.join(' ').trim();
                if (paragraph) {
                    output.push(`<p>${formatInline(paragraph)}</p>`);
                }
            };

            let paragraphLines = [];

            const closeParagraph = () => {
                if (!paragraphLines.length) {
                    return;
                }

                flushList();
                flushCode();
                flushMath();
                flushParagraph(paragraphLines);
                paragraphLines = [];
            };

            for (const rawLine of lines) {
                const line = rawLine.trimEnd();

                if (line.trim() === '') {
                    closeParagraph();
                    continue;
                }

                if (line.startsWith('```')) {
                    closeParagraph();
                    if (inCode) {
                        flushCode();
                    } else {
                        inCode = true;
                    }
                    continue;
                }

                if (inCode) {
                    codeLines.push(line);
                    continue;
                }

                if (line === '---') {
                    closeParagraph();
                    output.push('<hr>');
                    continue;
                }

                if (line.startsWith('$$')) {
                    closeParagraph();
                    const mathContent = line === '$$' ? '' : line.replace(/^\$\$/, '').replace(/\$\$$/, '');
                    if (mathContent) {
                        output.push(`<div class="math-block"><span class="math-label">Equation</span><div>${escapeHtml(mathContent)}</div></div>`);
                    } else if (!inMath) {
                        inMath = true;
                    } else {
                        flushMath();
                    }
                    continue;
                }

                if (inMath) {
                    if (line.endsWith('$$')) {
                        mathLines.push(line.replace(/\$\$$/, ''));
                        flushMath();
                    } else {
                        mathLines.push(line);
                    }
                    continue;
                }

                const headingMatch = line.match(/^(#{1,3})\s+(.*)$/);
                if (headingMatch) {
                    closeParagraph();
                    flushList();
                    const level = headingMatch[1].length;
                    output.push(`<h${level}>${formatInline(headingMatch[2])}</h${level}>`);
                    continue;
                }

                const unorderedMatch = line.match(/^[-*]\s+(.*)$/);
                const orderedMatch = line.match(/^\d+\.\s+(.*)$/);

                if (unorderedMatch || orderedMatch) {
                    closeParagraph();
                    const nextType = unorderedMatch ? 'ul' : 'ol';
                    if (currentListType && currentListType !== nextType) {
                        flushList();
                    }

                    currentListType = nextType;
                    listItems.push(formatInline((unorderedMatch || orderedMatch)[1]));
                    continue;
                }

                if (currentListType) {
                    flushList();
                }

                paragraphLines.push(line);
            }

            closeParagraph();
            flushList();
            flushCode();
            flushMath();

            return output.join('');
        }

        function setThinking(isThinking) {
            const indicator = document.getElementById('thinkingIndicator');
            const button = document.querySelector('button[onclick="sendToGroq()"]');
            indicator.classList.toggle('is-visible', isThinking);
            indicator.setAttribute('aria-busy', isThinking ? 'true' : 'false');
            button.disabled = isThinking;
            button.textContent = isThinking ? 'Thinking…' : 'Send';
        }

        function setOfflineOptionDisabled(isDisabled) {
            const options = document.querySelectorAll('option[value^="offline"]');
            options.forEach(option => {
                option.disabled = isDisabled;
            });
        }

        async function refreshOfflineStatus() {
            if (offlinePollActive || isOfflineRequestActive) {
                return;
            }

            try {
                const response = await fetch('/api/offline/status');
                if (!response.ok) {
                    return;
                }
                const data = await response.json();
                setOfflineOptionDisabled(data.busy);
                const referenceCopy = document.getElementById('modelReferenceCopy');
                if (isOfflineModel(getSelectedModel())) {
                    if (data.busy) {
                        const queued = typeof data.queued === 'number' ? data.queued : 0;
                        referenceCopy.textContent = `Ollama is busy. ${queued} queued ahead.`;
                    } else {
                        const offlineModelName = getOfflineModelName(getSelectedModel());
                        const modelCopy = offlineModelName ? ` (${offlineModelName})` : '';
                        referenceCopy.textContent = `This uses Ollama locally${modelCopy}. It is intensive to run, so use it only when needed.`;
                    }
                }
            } catch (error) {
                console.error('Offline status error:', error);
            }
        }

        function startOfflineStatusPolling() {
            if (offlineStatusTimer) {
                clearInterval(offlineStatusTimer);
            }
            offlineStatusTimer = setInterval(refreshOfflineStatus, 5000);
        }

        async function pollOfflineJob(jobId) {
            if (offlinePollActive) {
                return;
            }
            offlinePollActive = true;
            const referenceCopy = document.getElementById('modelReferenceCopy');

            while (true) {
                try {
                    const response = await fetch(`/api/offline/job/${jobId}`);
                    if (!response.ok) {
                        throw new Error('Unable to check offline job status.');
                    }
                    const data = await response.json();
                    if (data.status === 'queued') {
                        const position = typeof data.position === 'number' ? data.position : 0;
                        referenceCopy.textContent = `Ollama queued. ${position} ahead of you.`;
                    } else if (data.status === 'running') {
                        if (data.startedAt) {
                            const elapsedSeconds = Math.max(0, Math.floor((Date.now() / 1000) - data.startedAt));
                            referenceCopy.textContent = `Ollama is running your request now. Elapsed: ${elapsedSeconds}s.`;
                        } else {
                            referenceCopy.textContent = 'Ollama is running your request now.';
                        }
                    } else if (data.status === 'done') {
                        const assistantMessage = data.assistantMessage || { role: 'assistant', content: '' };
                        accumulatedResponses.push(assistantMessage);
                        appendMessage('assistant', assistantMessage.content, false);
                        break;
                    } else if (data.status === 'error') {
                        throw new Error(data.error || 'Offline request failed.');
                    }
                } catch (error) {
                    appendMessage('assistant', `Error: ${error.message || 'Offline request failed.'}`, true);
                    break;
                }

                await new Promise(resolve => setTimeout(resolve, 1500));
            }

            offlinePollActive = false;
            offlineJobId = null;
            isOfflineRequestActive = false;
            setOfflineOptionDisabled(false);
            refreshOfflineStatus();
            if (isAuthenticated) {
                loadChats();
            }
        }

        function appendMessage(role, content, isError) {
            const responseOutput = document.getElementById('responseOutput');
            responseOutput.classList.add('chat-thread');
            const message = document.createElement('div');
            message.className = `message ${role}`;
            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';
            messageContent.innerHTML = isError ? `<p>${formatInline(content)}</p>` : renderResponseMarkdown(content);
            message.appendChild(messageContent);
            responseOutput.appendChild(message);
            responseOutput.scrollTop = responseOutput.scrollHeight;
        }

        document.getElementById('modelSelect').addEventListener('change', updateModelReference);
        updateModelReference();
        startOfflineStatusPolling();
        refreshAccount();

        async function sendToGroq() {
            const selectedModel = getSelectedModel();
            const isOffline = isOfflineModel(selectedModel);
            const offlineModelName = isOffline ? getOfflineModelName(selectedModel) : '';
            const prompt = document.getElementById('userInput').value;
            const attachmentFile = document.getElementById('imageInput').files[0];
            const attachmentData = await readFileAsDataUrl(attachmentFile);
            const attachment = attachmentFile ? {
                name: attachmentFile.name,
                type: attachmentFile.type || 'application/octet-stream',
                dataUrl: attachmentData
            } : null;

            try {
                setThinking(true);
                const attachmentSummary = attachmentFile ? `Attachment: ${attachmentFile.name} (${attachmentFile.type || 'application/octet-stream'})` : '';
                const userMessageContent = [prompt.trim(), attachmentSummary].filter(Boolean).join('\n\n');

                if (userMessageContent) {
                    const userMessage = { role: 'user', content: userMessageContent };
                    accumulatedResponses.push(userMessage);
                    appendMessage('user', userMessageContent, false);
                }

                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: isOffline ? 'offline' : selectedModel,
                        prompt: prompt,
                        messages: accumulatedResponses,
                        attachment: attachment,
                        offlineModel: offlineModelName,
                        chatId: isAuthenticated ? currentChatId : null
                    })
                });

                const data = await response.json();

                if (isOffline) {
                    if (response.status !== 202) {
                        throw new Error(data.error || 'Offline request failed.');
                    }

                    offlineJobId = data.jobId;
                    isOfflineRequestActive = true;
                    setOfflineOptionDisabled(true);
                    if (data.chatId) {
                        currentChatId = data.chatId;
                    }
                    const position = typeof data.position === 'number' ? data.position : 0;
                    appendMessage('assistant', `Ollama queued. ${position} ahead of you.`, false);
                    pollOfflineJob(offlineJobId);
                    return;
                }

                if (!response.ok) {
                    throw new Error(data.error || 'Request failed.');
                }

                const assistantMessage = data.assistantMessage || { role: 'assistant', content: '' };
                accumulatedResponses.push(assistantMessage);
                console.log(accumulatedResponses)
                appendMessage('assistant', assistantMessage.content, false);
                if (data.chatId) {
                    currentChatId = data.chatId;
                }
            } catch (error) {
                console.error('Error:', error);
                console.log('Accumulated Responses:', accumulatedResponses);
                appendMessage('assistant', `Error: ${error.message || 'Error occurred.'}`, true);
            } finally {
                setThinking(false);
                if (isAuthenticated) {
                    loadChats();
                }
            }
        }
    </script>
</body>

</html>
